<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>チンチロ大会</title>

<style>

body{
font-family:sans-serif;
background:#f4f4f4;
text-align:center;
margin:0;
}

button{
padding:16px 26px;
font-size:18px;
margin:10px;
border:none;
border-radius:12px;
background:#333;
color:white;
}

input{
padding:10px;
font-size:16px;
margin:6px;
}

#title,#rules,#setup,#game{
display:none;
padding:20px;
}

#title{
display:block;
}

#playerCard{
font-size:26px;
margin:15px;
font-weight:bold;
}

#turnList{
margin:10px auto;
max-width:300px;
background:white;
padding:10px;
border-radius:10px;
}

.turnPlayer{
padding:6px;
}

.active{
background:#ffe08a;
border-radius:6px;
}

#bowl{
width:320px;
height:320px;
margin:20px auto;
border-radius:50%;
background:radial-gradient(circle,#ffffff 40%,#dcdcdc 70%,#bfbfbf);
border:12px solid #b8b8b8;
position:relative;
box-shadow:
inset 0 0 35px rgba(0,0,0,0.35),
0 10px 18px rgba(0,0,0,0.25);
}

.dice{
width:70px;
height:70px;
background:white;
border-radius:12px;
box-shadow:0 3px 6px rgba(0,0,0,0.4);
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(3,1fr);
padding:6px;
position:absolute;
}

#d1{left:40px;top:120px;}
#d2{left:125px;top:70px;}
#d3{left:210px;top:120px;}

.dot{
width:12px;
height:12px;
background:black;
border-radius:50%;
justify-self:center;
align-self:center;
}

.shake{
animation:shake 0.6s;
}

@keyframes shake{
0%{transform:rotate(0deg)}
25%{transform:rotate(5deg)}
50%{transform:rotate(-5deg)}
75%{transform:rotate(5deg)}
100%{transform:rotate(0deg)}
}

#bowlCover{
position:absolute;
width:100%;
height:100%;
border-radius:50%;
background:#ddd;
opacity:0;
transition:opacity .3s;
}

.coverOn{
opacity:1;
}

#result{
font-size:28px;
margin-top:10px;
font-weight:bold;
}

#scoreboard{
margin-top:20px;
}

.resultCard{
background:white;
margin:10px auto;
padding:15px;
max-width:300px;
border-radius:12px;
font-size:22px;
}

</style>
</head>

<body>

<div id="title">

<h1>🍶 チンチロ大会 🎲</h1>

<button onclick="showSetup()">ゲーム開始</button>
<button onclick="openRules()">ルール</button>

</div>

<div id="rules">

<h2>チンチロのルール</h2>

<ul style="text-align:left;display:inline-block">
<li>ピンゾロ（1-1-1）最強</li>
<li>アラシ（同じ数字3つ）</li>
<li>シゴロ（4-5-6）</li>
<li>目あり（同じ数字2つ）</li>
<li>目なし</li>
<li>ヒフミ（1-2-3）弱い</li>
</ul>

<br><br>

<button onclick="goHome()">戻る</button>

</div>

<div id="setup">

<h2>参加人数</h2>

<input id="playerCount" type="number" min="2" max="9" value="3">

<br>

<button onclick="makeInputs()">プレイヤー名入力</button>

<div id="nameInputs"></div>

<button onclick="startGame()">ゲーム開始</button>

<button onclick="goHome()">タイトルへ戻る</button>

</div>

<div id="game">

<div id="playerCard"></div>

<div id="turnList"></div>

<div id="bowl">

<div id="bowlCover"></div>

<div class="dice" id="d1"></div>
<div class="dice" id="d2"></div>
<div class="dice" id="d3"></div>

</div>

<button onclick="rollDice()">サイコロを振る</button>

<div id="result"></div>

<div id="scoreboard"></div>

<div id="after"></div>

</div>

<script>

let players=[]
let results=[]
let current=0
let rolling=false

function showSetup(){
title.style.display="none"
setup.style.display="block"
}

function openRules(){
title.style.display="none"
rules.style.display="block"
}

function goHome(){

players=[]
results=[]
current=0

title.style.display="block"
rules.style.display="none"
setup.style.display="none"
game.style.display="none"

scoreboard.innerHTML=""
result.innerHTML=""
after.innerHTML=""

}

function makeInputs(){

let n=parseInt(playerCount.value)
let html=""

for(let i=0;i<n;i++){

html+=`<input id="p${i}" placeholder="プレイヤー${i+1}"><br>`

}

nameInputs.innerHTML=html

}

function startGame(){

players=[]
results=[]
current=0

let n=parseInt(playerCount.value)

for(let i=0;i<n;i++){

let name=document.getElementById("p"+i).value.trim()

if(name===""){
name="プレイヤー"+(i+1)
}

players.push(name)

}

setup.style.display="none"
game.style.display="block"

drawTurnList()
showPlayer()

}

function drawTurnList(){

let html=""

players.forEach((p,i)=>{

html+=`<div class="turnPlayer ${i==current?'active':''}">${i+1}. ${p}</div>`

})

turnList.innerHTML=html

}

function showPlayer(){

playerCard.innerText="🎲 "+players[current]+" の番"

drawTurnList()

}

function rollDice(){

if(rolling) return
rolling=true

if(Math.random()<0.07){

result.innerText="💦 ションベン！振り直し！"

setTimeout(()=>{
rolling=false
rollDice()
},1200)

return
}

bowl.classList.add("shake")
bowlCover.classList.add("coverOn")

setTimeout(()=>{

let dice=[random(),random(),random()]

drawDice(d1,dice[0])
drawDice(d2,dice[1])
drawDice(d3,dice[2])

bowlCover.classList.remove("coverOn")
bowl.classList.remove("shake")

judge(dice)

},800)

}

function random(){
return Math.floor(Math.random()*6)+1
}

function drawDice(el,num){

let map={
1:[5],
2:[1,9],
3:[1,5,9],
4:[1,3,7,9],
5:[1,3,5,7,9],
6:[1,3,4,6,7,9]
}

el.innerHTML=""

for(let i=1;i<=9;i++){

let c=document.createElement("div")

if(map[num].includes(i)) c.className="dot"

el.appendChild(c)

}

}

function judge(nums){

nums.sort()

let text=""
let score=0

if(nums[0]==1&&nums[1]==1&&nums[2]==1){
text="🎉ピンゾロ🎉"
score=100
}
else if(nums[0]==nums[1]&&nums[1]==nums[2]){
text="アラシ"
score=80
}
else if(nums[0]==4&&nums[1]==5&&nums[2]==6){
text="シゴロ"
score=70
}
else if(nums[0]==1&&nums[1]==2&&nums[2]==3){
text="ヒフミ"
score=10
}
else if(nums[0]==nums[1]){
text="目あり "+nums[2]
score=40+nums[2]
}
else if(nums[1]==nums[2]){
text="目あり "+nums[0]
score=40+nums[0]
}
else{
text="目なし"
score=20
}

result.innerText=text

results.push({
player:players[current],
score:score,
role:text
})

setTimeout(()=>{
rolling=false
nextPlayer()
},1200)

}

function nextPlayer(){

current++

if(current>=players.length){
finish()
}else{
showPlayer()
}

}

function finish(){

results.sort((a,b)=>b.score-a.score)

let html="<h2>🏆結果発表🏆</h2>"

results.forEach((r,i)=>{

let medal=""

if(i==0) medal="🥇"
if(i==1) medal="🥈"
if(i==2) medal="🥉"

html+=`
<div class="resultCard">
${medal} ${i+1}位<br>
<b>${r.player}</b><br>
${r.role}
</div>
`

})

scoreboard.innerHTML=html

after.innerHTML=`
<button onclick="restart()">もう一回遊ぶ</button>
<button onclick="goHome()">タイトルへ戻る</button>
`

}

function restart(){

results=[]
current=0

scoreboard.innerHTML=""
result.innerHTML=""
after.innerHTML=""

showPlayer()

}

</script>

</body>
</html>
